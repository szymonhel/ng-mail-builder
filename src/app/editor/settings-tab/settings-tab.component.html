<div hlmTabs tab="global" class="flex flex-col flex-1 overflow-hidden bg-gray-100">

  <!-- Tab bar -->
  <div hlmTabsList class="w-full max-w-4xl mx-auto mt-6 shrink-0 rounded-none border-b border-gray-200 bg-white h-auto p-0">
    <button hlmTabsTrigger="global" class="flex-1 py-2 rounded-none">Global</button>
    <button hlmTabsTrigger="colors" class="flex-1 py-2 rounded-none">Colors</button>
    <button hlmTabsTrigger="variables" class="flex-1 py-2 rounded-none">Variables</button>
  </div>

  <!-- Global settings tab -->
  <div hlmTabsContent="global" class="flex-1 overflow-auto p-6">
    <div class="max-w-4xl mx-auto bg-white rounded-lg border border-gray-200 p-6 flex flex-col gap-5">

      <div>
        <div class="text-[10px] font-semibold uppercase tracking-wider text-gray-500 mb-2">Layout</div>
        <div class="flex flex-col gap-2">
          <label class="text-xs text-gray-600">Content width (px)</label>
          <input hlmInput type="number"
                 [value]="store.doc().settings.contentWidth"
                 (change)="store.updateSettings({ contentWidth: +$any($event.target).value })" />
        </div>
      </div>

      <div>
        <div class="text-[10px] font-semibold uppercase tracking-wider text-gray-500 mb-2">Colors</div>
        <div class="flex flex-col gap-2">
          <label class="text-xs text-gray-600">Page background</label>
          <app-color-picker [value]="store.doc().settings.backgroundColor"
                 (valueChange)="store.updateSettings({ backgroundColor: $event })" />
          <label class="text-xs text-gray-600">Email body background</label>
          <app-color-picker [value]="store.doc().settings.bodyColor"
                 (valueChange)="store.updateSettings({ bodyColor: $event })" />
        </div>
      </div>

      <div>
        <div class="text-[10px] font-semibold uppercase tracking-wider text-gray-500 mb-2">Typography</div>
        <div class="flex flex-col gap-2">
          <label class="text-xs text-gray-600">Font family</label>
          <input hlmInput type="text"
                 [value]="store.doc().settings.fontFamily"
                 (change)="store.updateSettings({ fontFamily: $any($event.target).value })"
                 placeholder="Arial, sans-serif" />
          <label class="text-xs text-gray-600">Google Font name</label>
          <input hlmInput type="text"
                 [value]="store.doc().settings.googleFontName"
                 (change)="store.updateSettings({ googleFontName: $any($event.target).value })"
                 placeholder="e.g. Roboto" />
          <label class="text-xs text-gray-600">Google Font URL</label>
          <input hlmInput type="text"
                 [value]="store.doc().settings.googleFontUrl"
                 (change)="store.updateSettings({ googleFontUrl: $any($event.target).value })"
                 placeholder="https://fonts.googleapis.com/css?family=Roboto" />
        </div>
      </div>

      <div>
        <div class="text-[10px] font-semibold uppercase tracking-wider text-gray-500 mb-2">Inbox</div>
        <div class="flex flex-col gap-2">
          <label class="text-xs text-gray-600">Preview text</label>
          <input hlmInput type="text"
                 [value]="store.doc().settings.previewText"
                 (change)="store.updateSettings({ previewText: $any($event.target).value })"
                 placeholder="Shown in inbox before opening..." />
        </div>
      </div>

    </div>
  </div>

  <!-- Colors tab -->
  <div hlmTabsContent="colors" class="flex-1 overflow-hidden flex">
    <app-colors-tab class="flex flex-1 overflow-hidden" />
  </div>

  <!-- Variables tab -->
  <div hlmTabsContent="variables" class="flex-1 overflow-hidden flex">
    <app-variables-tab class="flex flex-1 overflow-hidden" />
  </div>

</div>
