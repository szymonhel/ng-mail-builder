<div class="flex flex-col h-full">
  <div class="px-4 py-2 border-b border-gray-200 bg-gray-50 flex gap-3 items-center">
    <div class="flex gap-1">
      <button hlmBtn size="sm" [variant]="mode === 'desktop' ? 'default' : 'outline'" (click)="setMode('desktop')">Desktop</button>
      <button hlmBtn size="sm" [variant]="mode === 'mobile' ? 'default' : 'outline'" (click)="setMode('mobile')">Mobile</button>
    </div>
    <div class="flex gap-1">
      <button hlmBtn size="sm" [variant]="!rawVariables() ? 'default' : 'outline'" (click)="setRawVariables(false)"
              title="Show variables replaced with their preview values">Merged</button>
      <button hlmBtn size="sm" [variant]="rawVariables() ? 'default' : 'outline'" (click)="setRawVariables(true)"
              title="Show the exported HTML as-is, with {{ '{{' }} tokens {{ '}}' }} untouched">Raw</button>
    </div>
    @if (!hideLocalePicker() && store.doc().locales.length > 0) {
      <select class="text-sm border border-gray-300 rounded-sm px-2 py-1"
              [ngModel]="locale()" (ngModelChange)="setLocale($event)">
        <option [ngValue]="null">Source language</option>
        @for (l of store.doc().locales; track l.id) {
          <option [ngValue]="l.id">{{ l.label || l.code }}</option>
        }
      </select>
    }
  </div>
  <div class="flex-1 overflow-auto bg-gray-200 p-6 flex justify-center">
    <div class="w-full bg-white shadow-lg rounded-sm overflow-hidden transition-all duration-300"
         [style.maxWidth]="mode === 'mobile' ? '375px' : '700px'">
      <iframe #iframeEl [src]="iframeSrc()" (load)="onIframeLoad()" class="w-full h-full border-0 block" title="Email preview"></iframe>
    </div>
  </div>
</div>
