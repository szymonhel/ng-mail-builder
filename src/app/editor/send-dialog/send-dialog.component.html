<div class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center" (click)="close()">
  <div class="bg-white rounded-lg shadow-xl w-full max-w-md mx-4 overflow-hidden" (click)="$event.stopPropagation()">

    <div class="px-6 py-4 border-b border-gray-200 flex items-center justify-between">
      <h2 class="text-base font-semibold text-gray-900 m-0">Send Email</h2>
      <button hlmBtn type="button" variant="ghost" size="icon-sm" (click)="close()">&#x2715;</button>
    </div>

    @if (status() === 'success') {
      <div class="px-6 py-10 text-center">
        <div class="text-4xl mb-3">&#x2713;</div>
        <p class="text-green-700 font-medium text-sm mb-4">Email sent successfully!</p>
        <button hlmBtn type="button" variant="secondary" (click)="close()">Close</button>
      </div>
    } @else {
      <form class="px-6 py-5 flex flex-col gap-4" (ngSubmit)="submit()">

        <div class="flex flex-col gap-1">
          <label class="text-xs font-medium text-gray-600">To *</label>
          <input
            hlmInput
            type="email"
            [ngModel]="to"
            (ngModelChange)="onToChange($event)"
            name="to"
            placeholder="recipient@example.com"
            required
          />
        </div>

        <div class="flex flex-col gap-1">
          <label class="text-xs font-medium text-gray-600">Recipient name <span class="text-gray-400 font-normal">(optional)</span></label>
          <input
            hlmInput
            type="text"
            [(ngModel)]="toName"
            name="toName"
            placeholder="John Doe"
          />
        </div>

        <div class="flex flex-col gap-1">
          <label class="text-xs font-medium text-gray-600">Subject *</label>
          <input
            hlmInput
            type="text"
            [(ngModel)]="subject"
            name="subject"
            placeholder="Your email subject"
            required
          />
        </div>

        @if (variables().length > 0) {
          <div class="flex flex-col gap-3 pt-1 border-t border-gray-200">
            <label class="text-xs font-medium text-gray-600 pt-3">Variables for this send</label>
            @for (v of variables(); track v.id) {
              <div class="flex flex-col gap-1">
                <label class="text-[11px] text-gray-500">{{ '{{' + v.name + '}}' }}</label>
                <input
                  hlmInput
                  type="text"
                  [ngModel]="variableValues()[v.name] ?? ''"
                  (ngModelChange)="setVariableValue(v.name, $event)"
                  [name]="'var_' + v.name"
                />
              </div>
            }
          </div>
        }

        @if (status() === 'error') {
          <p class="text-red-600 text-xs bg-red-50 border border-red-200 rounded-sm px-3 py-2 m-0">{{ errorMessage() || 'Failed to send email. Please try again.' }}</p>
        }

        <div class="flex gap-2 justify-end pt-1">
          <button hlmBtn type="button" variant="outline" (click)="close()">Cancel</button>
          <button
            hlmBtn
            type="submit"
            [disabled]="!to || !subject || status() === 'sending'"
          >
            {{ status() === 'sending' ? 'Sending...' : 'Send' }}
          </button>
        </div>

      </form>
    }

  </div>
</div>
