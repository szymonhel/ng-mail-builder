<div class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center" (click)="close()">
  <div class="bg-white rounded-lg shadow-xl w-full max-w-md mx-4 overflow-hidden" (click)="$event.stopPropagation()">

    <div class="px-6 py-4 border-b border-gray-200 flex items-center justify-between">
      <h2 class="text-base font-semibold text-gray-900 m-0">Send Email</h2>
      <button class="text-gray-400 hover:text-gray-600 text-xl leading-none bg-transparent border-0 cursor-pointer" (click)="close()">&#x2715;</button>
    </div>

    @if (status() === 'success') {
      <div class="px-6 py-10 text-center">
        <div class="text-4xl mb-3">&#x2713;</div>
        <p class="text-green-700 font-medium text-sm mb-4">Email sent successfully!</p>
        <button class="bg-gray-100 text-gray-700 border-0 px-4 py-2 rounded cursor-pointer text-sm hover:bg-gray-200" (click)="close()">Close</button>
      </div>
    } @else {
      <form class="px-6 py-5 flex flex-col gap-4" (ngSubmit)="submit()">

        <div class="flex flex-col gap-1">
          <label class="text-xs font-medium text-gray-600">To *</label>
          <input
            type="email"
            [ngModel]="to"
            (ngModelChange)="onToChange($event)"
            name="to"
            placeholder="recipient@example.com"
            required
            class="border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:border-blue-500"
          />
        </div>

        <div class="flex flex-col gap-1">
          <label class="text-xs font-medium text-gray-600">Recipient name <span class="text-gray-400 font-normal">(optional)</span></label>
          <input
            type="text"
            [(ngModel)]="toName"
            name="toName"
            placeholder="John Doe"
            class="border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:border-blue-500"
          />
        </div>

        <div class="flex flex-col gap-1">
          <label class="text-xs font-medium text-gray-600">Subject *</label>
          <input
            type="text"
            [(ngModel)]="subject"
            name="subject"
            placeholder="Your email subject"
            required
            class="border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:border-blue-500"
          />
        </div>

        @if (status() === 'error') {
          <p class="text-red-600 text-xs bg-red-50 border border-red-200 rounded px-3 py-2 m-0">{{ errorMessage() || 'Failed to send email. Please try again.' }}</p>
        }

        <div class="flex gap-2 justify-end pt-1">
          <button type="button" class="bg-white text-gray-700 border border-gray-300 px-4 py-2 rounded cursor-pointer text-sm hover:bg-gray-50" (click)="close()">Cancel</button>
          <button
            type="submit"
            [disabled]="!to || !subject || status() === 'sending'"
            [ngClass]="(!to || !subject || status() === 'sending') ? 'opacity-50 cursor-not-allowed' : 'hover:bg-blue-700'"
            class="bg-blue-600 text-white border-0 px-4 py-2 rounded cursor-pointer text-sm font-medium transition-colors"
          >
            {{ status() === 'sending' ? 'Sending...' : 'Send' }}
          </button>
        </div>

      </form>
    }

  </div>
</div>
