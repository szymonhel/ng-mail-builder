<div class="bg-gray-200 min-h-full p-6 box-border" (click)="clearSelection($event)">
  <div class="mx-auto shadow-md rounded-sm overflow-hidden box-border"
       [style.maxWidth.px]="store.effectiveDoc().settings.contentWidth"
       [style.background]="store.effectiveDoc().settings.bodyColor"
       [style.border]="store.effectiveDoc().settings.bodyBorderWidth > 0
         ? store.effectiveDoc().settings.bodyBorderWidth + 'px ' + store.effectiveDoc().settings.bodyBorderStyle + ' ' + store.effectiveDoc().settings.bodyBorderColor
         : 'none'">
    <div cdkDropList [id]="canvasRowsListId" (cdkDropListDropped)="onRowDrop($event)" class="min-h-[40px] p-2">
      @for (row of store.doc().rows; track row.id) {
        <div cdkDrag class="cursor-default">
          <app-row [row]="row" />
        </div>
      }
    </div>
    <div class="p-3 text-center border-t border-gray-100">
      <button hlmBtn variant="outline" (click)="addRow()">+ Add Row</button>
    </div>
  </div>
</div>
