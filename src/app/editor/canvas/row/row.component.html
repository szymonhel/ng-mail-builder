<div class="relative border-2 rounded-sm mb-2 transition-colors hover:border-gray-200"
     [class.border-blue-500]="isRowSelected()"
     [class.border-transparent]="!isRowSelected()"
     (click)="selectRow($event)">

  <!-- Row toolbar -->
  <div class="flex items-center justify-between px-2 py-1 bg-gray-50 border-b border-gray-100 text-xs text-gray-400">
    <span>
      Row &middot; {{ row().columns.length }} col{{ row().columns.length !== 1 ? 's' : '' }}
      @if (row().condition) {
        <span class="ml-1.5 inline-block bg-amber-100 text-amber-700 px-1.5 py-0.5 rounded-sm text-[10px] font-semibold align-middle" title="Only rendered when its condition is met">conditional</span>
      }
      @if (row().repeat; as repeat) {
        <span class="ml-1.5 inline-block bg-emerald-100 text-emerald-700 px-1.5 py-0.5 rounded-sm text-[10px] font-semibold align-middle" title="Rendered once per item of this collection">&#x21bb; {{ repeat.collectionName }}</span>
      }
    </span>
    <div class="flex items-center gap-1">
      <button hlmBtn variant="outline" size="xs" (click)="addColumn($event)" title="Add column">+ col</button>
      <button hlmBtn variant="ghost" size="icon-xs" class="text-destructive" (click)="removeRow($event)" title="Remove row">&#x2715;</button>
    </div>
  </div>

  <!-- Columns -->
  <div class="flex divide-x divide-gray-200" [style.background]="row().backgroundColor ?? store.effectiveDoc().settings.bodyColor">
    @for (col of row().columns; track col.id; let last = $last) {
      <div class="flex-1 min-w-0 relative ring-inset transition-colors"
           [class.ring-2]="isColumnSelected(col.id)"
           [class.ring-indigo-400]="isColumnSelected(col.id)"
           [style.background]="col.backgroundColor ?? null"
           (click)="selectColumn(col.id, $event)">

        @if (row().columns.length > 1) {
          <button hlmBtn variant="ghost" size="icon-xs" class="text-destructive absolute top-1 right-1 z-10"
                  (click)="removeColumn(col.id, $event)" title="Remove column">&#x2715;</button>
        }

        <app-column [row]="row()" [col]="col" />
      </div>
    }
  </div>
</div>
