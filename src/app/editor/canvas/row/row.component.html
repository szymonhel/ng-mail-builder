<div class="relative border-2 rounded mb-2 transition-colors hover:border-gray-200"
     [class.border-blue-500]="isRowSelected()"
     [class.border-transparent]="!isRowSelected()"
     (click)="selectRow($event)">

  <!-- Row toolbar -->
  <div class="flex items-center justify-between px-2 py-1 bg-gray-50 border-b border-gray-100 text-xs text-gray-400">
    <span>Row &middot; {{ row().columns.length }} col{{ row().columns.length !== 1 ? 's' : '' }}</span>
    <div class="flex items-center gap-1">
      <button class="border border-gray-300 bg-white text-gray-500 cursor-pointer px-1.5 py-0.5 rounded text-xs hover:border-blue-400 hover:text-blue-600 hover:bg-blue-50"
              (click)="addColumn($event)" title="Add column">+ col</button>
      <button class="border-0 bg-transparent cursor-pointer px-1.5 py-0.5 rounded text-xs text-red-500 hover:bg-red-50"
              (click)="removeRow($event)" title="Remove row">&#x2715;</button>
    </div>
  </div>

  <!-- Columns -->
  <div class="flex divide-x divide-gray-200">
    @for (col of row().columns; track col.id; let last = $last) {
      <div class="flex-1 min-w-0 relative">

        <!-- Remove column button (only when >1 col) -->
        @if (row().columns.length > 1) {
          <button class="absolute top-1 right-1 z-10 border-0 bg-transparent cursor-pointer text-[10px] text-red-400 hover:text-red-600 leading-none px-1"
                  (click)="removeColumn(col.id, $event)" title="Remove column">&#x2715; col</button>
        }

        <app-column [row]="row()" [col]="col" />
      </div>
    }
  </div>
</div>
