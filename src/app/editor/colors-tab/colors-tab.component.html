<div class="flex-1 overflow-auto bg-gray-100 p-6">
  <div class="max-w-2xl mx-auto bg-white rounded-lg border border-gray-200 p-6">
    <h2 class="text-base font-semibold text-gray-900 mt-0 mb-1">Saved Colors</h2>
    <p class="text-xs text-gray-500 mt-0 mb-4">
      Colors you save here show up as quick picks in every color picker across the editor.
      Stored locally in this browser for now.
    </p>

    <div class="flex items-end gap-2 mb-5 pb-5 border-b border-gray-200">
      <div class="flex flex-col gap-1">
        <label class="text-[10px] font-semibold text-gray-600 uppercase tracking-wider">Color</label>
        <input type="color" class="w-14 h-9 border border-gray-300 rounded-sm cursor-pointer p-0.5"
               [ngModel]="newValue()" (ngModelChange)="newValue.set($event)" />
      </div>
      <div class="flex flex-col gap-1 flex-1">
        <label class="text-[10px] font-semibold text-gray-600 uppercase tracking-wider">Name</label>
        <input type="text" class="w-full px-2 py-1.5 border border-gray-300 rounded-sm text-sm box-border font-sans bg-white focus:outline-hidden focus:border-blue-500"
               placeholder="e.g. Brand Blue" [ngModel]="newName()" (ngModelChange)="newName.set($event)" (keydown.enter)="add()" />
      </div>
      <button type="button"
              class="bg-blue-600 text-white border-0 px-4 py-2 rounded-sm cursor-pointer text-sm font-medium hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed"
              [disabled]="!newName().trim()"
              (click)="add()">Add color</button>
    </div>

    @if (colors().length === 0) {
      <div class="text-sm text-gray-400 text-center py-8">No saved colors yet. Add one above.</div>
    } @else {
      <div class="grid grid-cols-2 gap-2">
        @for (c of colors(); track c.id) {
          <div class="flex items-center gap-2 border border-gray-200 rounded-sm px-2 py-1.5">
            <span class="w-6 h-6 rounded-sm border border-gray-300 shrink-0" [style.background]="c.value"></span>
            <div class="flex-1 min-w-0">
              <div class="text-sm text-gray-800 truncate">{{ c.name }}</div>
              <div class="text-[10px] text-gray-400">{{ c.value }}</div>
            </div>
            <button type="button" class="text-gray-400 hover:text-red-500 bg-transparent border-0 cursor-pointer text-sm" (click)="remove(c.id)">&#x2715;</button>
          </div>
        }
      </div>
    }
  </div>
</div>
