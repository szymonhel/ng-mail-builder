<div class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center" (click)="closed.emit()">
  <div class="bg-white rounded-lg shadow-xl w-full max-w-2xl mx-4 overflow-hidden flex flex-col max-h-[80vh]" (click)="$event.stopPropagation()">

    <div class="px-6 py-4 border-b border-gray-200 flex items-center justify-between shrink-0">
      <h2 class="text-base font-semibold text-gray-900 m-0">Choose an asset</h2>
      <div class="flex items-center gap-2">
        <button hlmBtn size="sm" [disabled]="uploading()" (click)="fileInput.click()">
          {{ uploading() ? 'Uploading…' : 'Upload new' }}
        </button>
        <input #fileInput type="file" class="hidden"
               accept="image/jpeg,image/png,image/gif,image/webp,image/svg+xml"
               (change)="onFileSelected($event)" />
        <button hlmBtn type="button" variant="ghost" size="icon-sm" (click)="closed.emit()">&#x2715;</button>
      </div>
    </div>

    <div class="px-6 py-4 overflow-y-auto">
      @if (error()) {
        <div class="flex items-center justify-between gap-4 px-4 py-2 mb-4 bg-red-50 border border-red-200 rounded-sm">
          <p class="text-red-600 text-xs m-0">{{ error() }}</p>
          <button class="text-red-600 text-xs underline shrink-0" (click)="error.set(null)">Dismiss</button>
        </div>
      }

      @if (loading()) {
        <app-spinner label="Loading assets…" />
      } @else if (assets().length === 0) {
        <p class="text-sm text-gray-500 m-0">No assets yet — upload your first image with the button above.</p>
      } @else {
        <div class="grid grid-cols-3 sm:grid-cols-4 gap-3">
          @for (asset of assets(); track asset.name) {
            <button type="button"
                    class="bg-white border border-gray-200 rounded-md overflow-hidden flex flex-col text-left cursor-pointer hover:border-blue-400 hover:shadow-sm transition-all"
                    (click)="pick(asset)">
              <div class="h-24 bg-[repeating-conic-gradient(#f3f4f6_0%_25%,#ffffff_0%_50%)] bg-[length:14px_14px] flex items-center justify-center overflow-hidden">
                <img [src]="asset.url" [alt]="displayName(asset)" loading="lazy" class="max-h-full max-w-full object-contain" />
              </div>
              <div class="p-2 flex flex-col">
                <span class="text-[11px] font-medium truncate" [title]="displayName(asset)">{{ displayName(asset) }}</span>
                <span class="text-[10px] text-gray-400">
                  @if (asset.width && asset.height) {{{ asset.width }}×{{ asset.height }} · }{{ formatSize(asset.size) }}
                </span>
              </div>
            </button>
          }
        </div>
      }
    </div>
  </div>
</div>
