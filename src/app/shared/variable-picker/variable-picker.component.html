<div class="relative inline-block">
  <button hlmBtn type="button" variant="outline" size="xs" class="whitespace-nowrap"
          (click)="toggle()">+ Variable</button>

  @if (open()) {
    <div class="absolute z-20 right-0 mt-1 w-48 bg-white border border-gray-200 rounded-sm shadow-lg p-2">
      @if (variables().length) {
        <div class="flex flex-col gap-0.5 max-h-48 overflow-y-auto">
          @for (v of variables(); track v.id) {
            <button hlmBtn type="button" variant="ghost" size="sm" class="justify-start w-full font-mono"
                    (click)="pick(v.name)">{{ '{{' + v.name + '}}' }}</button>
          }
        </div>
      } @else {
        <div class="text-xs text-gray-400">No variables yet. Add some in the Variables tab.</div>
      }
    </div>
  }
</div>
