<div class="relative inline-block">
  <button type="button"
          class="text-[10px] font-semibold text-blue-600 border border-blue-300 rounded px-1.5 py-0.5 cursor-pointer bg-white hover:bg-blue-50 whitespace-nowrap"
          (click)="toggle()">+ Variable</button>

  @if (open()) {
    <div class="absolute z-20 right-0 mt-1 w-48 bg-white border border-gray-200 rounded shadow-lg p-2">
      @if (variables().length) {
        <div class="flex flex-col gap-0.5 max-h-48 overflow-y-auto">
          @for (v of variables(); track v.id) {
            <button type="button"
                    class="text-left text-xs font-mono text-gray-700 hover:bg-blue-50 hover:text-blue-700 rounded px-2 py-1 cursor-pointer bg-transparent border-0"
                    (click)="pick(v.name)">{{ '{{' + v.name + '}}' }}</button>
          }
        </div>
      } @else {
        <div class="text-xs text-gray-400">No variables yet. Add some in the Variables tab.</div>
      }
    </div>
  }
</div>
