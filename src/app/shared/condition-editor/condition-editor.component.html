<div class="mb-3 p-2 border border-gray-200 rounded-sm bg-white">
  <div class="flex items-center gap-1.5">
    <hlm-checkbox [checked]="!!condition()" (checkedChange)="toggle($event)" />
    <label hlmLabel class="cursor-pointer text-[10px] uppercase tracking-wider" (click)="toggle(!condition())">{{ label() }}</label>
  </div>

  @if (condition(); as c) {
    @if (variables().length === 0) {
      <div class="text-xs text-gray-400 mt-1.5">No variables yet. Add one in the Variables tab.</div>
    } @else {
      <div class="flex flex-col gap-1.5 mt-1.5">
        <select hlmInput
                [value]="c.variableName" (change)="setVariableName($any($event.target).value)">
          @for (v of variables(); track v.id) {
            <option [value]="v.name">{{ v.name }}</option>
          }
        </select>
        <select hlmInput
                [value]="c.operator" (change)="setOperator($any($event.target).value)">
          <option value="isSet">is set</option>
          <option value="isNotSet">is not set</option>
          <option value="equals">equals</option>
          <option value="notEquals">does not equal</option>
        </select>
        @if (c.operator === 'equals' || c.operator === 'notEquals') {
          <input hlmInput type="text"
                 placeholder="Value" [value]="c.value ?? ''" (change)="setValue($any($event.target).value)" />
        }
      </div>
    }
  }
</div>
